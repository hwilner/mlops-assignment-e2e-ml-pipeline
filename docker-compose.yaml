# docker-compose.yaml — Production-style deployment of Airflow + MLflow
#
# This file deploys the full evaluation pipeline stack on a single VM:
#
#   postgres     — shared metadata database for Airflow
#   airflow-init — one-shot service that initialises the Airflow DB and
#                  creates the default admin user
#   airflow-web  — Airflow webserver (UI at http://localhost:8080)
#   airflow-sched— Airflow scheduler (picks up and executes DAG runs)
#   mlflow       — MLflow tracking server (UI at http://localhost:5000)
#
# Usage:
#   1. Copy .env.example to .env and fill in NEBIUS_API_KEY (and optionally
#      MLFLOW_S3_* variables for remote artefact storage).
#   2. docker compose up -d
#   3. Open http://localhost:8080  (Airflow, user: admin / password: admin)
#      Open http://localhost:5000  (MLflow)
#   4. Trigger the evaluate_agent DAG from the Airflow UI or CLI.
#
# Notes:
#   - The ./dags directory is mounted read-only into both airflow services so
#     DAG changes are picked up without rebuilding the image.
#   - The ./runs directory is mounted read-write so both Airflow tasks and the
#     host can inspect run artefacts.
#   - MLflow uses a local SQLite backend by default; set MLFLOW_BACKEND_STORE_URI
#     in .env to use PostgreSQL or another backend for production.

x-airflow-common: &airflow-common
  # Use the project's own Dockerfile so the same Python environment that runs
  # the scripts is also used inside Airflow tasks.
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    # Core Airflow settings.
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""          # generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "changeme-in-production"
    # MLflow tracking URI so DAG tasks can call mlflow.log_* directly.
    MLFLOW_TRACKING_URI: http://mlflow:5000
    # Nebius API key for mini-swe-agent inference calls.
    NEBIUS_API_KEY: ${NEBIUS_API_KEY}
    # Pass through any other env vars from .env.
    MSWEA_COST_TRACKING: ignore_errors
  volumes:
    # Mount DAGs directory so changes are reflected without rebuild.
    - ./dags:/opt/airflow/dags:ro
    # Mount scripts so Airflow tasks can call them.
    - ./scripts:/opt/airflow/scripts:ro
    # Mount runs directory read-write for artefact output.
    - ./runs:/opt/airflow/runs
    # Mount project root so uv can resolve the venv.
    - .:/mlops-assignment:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — shared metadata store for Airflow
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ---------------------------------------------------------------------------
  # Airflow initialisation — runs once, then exits
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow webserver — UI at http://localhost:8080
  # ---------------------------------------------------------------------------
  airflow-web:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow scheduler — executes DAG tasks
  # ---------------------------------------------------------------------------
  airflow-sched:
    <<: *airflow-common
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # MLflow tracking server — UI at http://localhost:5000
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
        --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-sqlite:///mlflow.db}
        --default-artifact-root ${MLFLOW_DEFAULT_ARTIFACT_ROOT:-/mlflow/artifacts}
        --host 0.0.0.0
        --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      # Optional: point to S3 for remote artefact storage.
      # AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-us-east-1}
      MLFLOW_BACKEND_STORE_URI:      ${MLFLOW_BACKEND_STORE_URI:-sqlite:///mlflow.db}
      MLFLOW_DEFAULT_ARTIFACT_ROOT:  ${MLFLOW_DEFAULT_ARTIFACT_ROOT:-/mlflow/artifacts}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  postgres-db-volume:
  mlflow-data:
